<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RFI Canonical UI Harness</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #172033;
        background: #eef2f7;
      }
      body { margin: 0; background: #eef2f7; }
      .rfi-harness { padding: 28px; }
      .rfi-shell { max-width: 1180px; margin: 0 auto; background: white; border: 1px solid #d8dee8; border-radius: 10px; overflow: hidden; }
      .rfi-top { display: flex; justify-content: space-between; gap: 18px; padding: 20px 24px; border-bottom: 1px solid #d8dee8; }
      .rfi-state { color: #1d4ed8; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; }
      h1 { margin: 4px 0 10px; font-size: 22px; line-height: 1.2; }
      .rfi-chip { display: inline-flex; align-items: center; margin-right: 6px; padding: 3px 8px; border-radius: 999px; background: #eef4ff; color: #1d4ed8; font-size: 11px; font-weight: 700; }
      .rfi-actions { display: flex; flex-wrap: wrap; justify-content: flex-end; align-content: flex-start; gap: 6px; max-width: 520px; }
      button { height: 30px; border-radius: 6px; border: 1px solid #cbd5e1; background: white; color: #334155; padding: 0 10px; font-size: 12px; font-weight: 700; }
      button.primary, .rfi-actions button.primary { border-color: #1d4ed8; background: #1d4ed8; color: white; }
      button.danger { border-color: #fecaca; color: #dc2626; }
      .rfi-content { padding: 0 24px 24px; }
      .rfi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; margin-top: 10px; }
      .rfi-two { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
      .rfi-field { border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 10px; min-height: 42px; background: #fbfdff; }
      .rfi-field.full { grid-column: 1 / -1; }
      .rfi-field span { display: block; color: #64748b; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 3px; }
      .rfi-panel { border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; background: #fbfdff; }
      .rfi-panel strong { display: block; margin-bottom: 6px; font-size: 12px; text-transform: uppercase; color: #64748b; }
      p { margin: 8px 0 0; color: #64748b; font-size: 12px; }
      [data-rfi-canonical-section] { margin-top: 16px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import React from "react";
      import { createRoot } from "react-dom/client";
      import { RfiCanonicalUiHarness, rfiCanonicalUiHarnessStates } from "/src/pages/project/RfiCanonicalUiHarness.tsx";

      const params = new URLSearchParams(window.location.search);
      const slug = params.get("state") || "new-rfi";
      const state = rfiCanonicalUiHarnessStates.find(item => item.slug === slug) || rfiCanonicalUiHarnessStates[0];
      createRoot(document.getElementById("root")).render(React.createElement(RfiCanonicalUiHarness, { state }));
    </script>
  </body>
</html>
