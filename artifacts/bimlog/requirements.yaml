packages:
  "framer-motion": "For premium page transitions and interactive animations"
  "react-hook-form": "For robust form state management"
  "@hookform/resolvers": "Zod validation integration for forms"
  "date-fns": "For formatting timestamps in activity logs and tables"
  "zustand": "For lightweight global auth and i18n state management"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for merging tailwind classes without style conflicts"

images:
  - path: "artifacts/bimlog/public/images/hero-bg.png"
    description: "Abstract geometric background with dark navy and steel blue tones, subtle glowing architectural wireframe lines, enterprise tech feel"
    aspect_ratio: "16:9"
  - path: "artifacts/bimlog/public/images/logo-icon.png"
    description: "Minimalist modern 3D building block logo icon in glowing amber and steel blue on transparent background"
    aspect_ratio: "1:1"

notes:
  - "Authentication token is stored in localStorage as 'bimlog_token'."
  - "The API client's customFetch is assumed to read this token for Authorization headers."
  - "Using English and Spanish i18n."
