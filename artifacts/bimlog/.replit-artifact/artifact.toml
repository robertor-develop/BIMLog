kind = "web"
previewPath = "/"
title = "BIMLog"
version = "1.0.0"
id = "artifacts/bimlog"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22858
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/bimlog run dev"

[services.env]
PORT = "22858"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/bimlog", "run", "build"]
publicDir = "artifacts/bimlog/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
