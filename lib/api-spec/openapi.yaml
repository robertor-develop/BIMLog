openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: BIMLog API specification
servers:
  - url: /api/v1
    description: Base API path (v1)
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: projects
    description: Project operations
  - name: files
    description: File operations
  - name: rfis
    description: RFI operations
  - name: submittals
    description: Submittal operations
  - name: activity
    description: Activity log operations
  - name: conventions
    description: Naming convention operations
  - name: members
    description: Team member operations
  - name: config
    description: Application configuration

paths:
  /config:
    get:
      operationId: getConfig
      tags: [config]
      summary: Get application configuration options (roles, statuses, separators)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Configuration options grouped by category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppConfig"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List projects for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project details
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{projectId}/files:
    get:
      operationId: listFiles
      tags: [files]
      summary: List files for a project
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: File list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectFile"
    post:
      operationId: uploadFile
      tags: [files]
      summary: Upload a file (validates naming convention)
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadFileRequest"
      responses:
        "201":
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectFile"
        "422":
          description: File name does not match naming convention
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /projects/{projectId}/files/{fileId}:
    patch:
      operationId: updateFile
      tags: [files]
      summary: Update a file (rename, status change)
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: fileId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFileRequest"
      responses:
        "200":
          description: File updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectFile"
    delete:
      operationId: deleteFile
      tags: [files]
      summary: Delete a file
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: fileId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: File deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /projects/{projectId}/rfis:
    get:
      operationId: listRfis
      tags: [rfis]
      summary: List RFIs for a project
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: RFI list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rfi"
    post:
      operationId: createRfi
      tags: [rfis]
      summary: Create an RFI
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRfiRequest"
      responses:
        "201":
          description: RFI created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rfi"

  /projects/{projectId}/rfis/{rfiId}:
    patch:
      operationId: updateRfi
      tags: [rfis]
      summary: Update an RFI
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: rfiId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRfiRequest"
      responses:
        "200":
          description: RFI updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rfi"

  /projects/{projectId}/submittals:
    get:
      operationId: listSubmittals
      tags: [submittals]
      summary: List submittals for a project
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Submittal list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Submittal"
    post:
      operationId: createSubmittal
      tags: [submittals]
      summary: Create a submittal
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubmittalRequest"
      responses:
        "201":
          description: Submittal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submittal"

  /projects/{projectId}/submittals/{submittalId}:
    patch:
      operationId: updateSubmittal
      tags: [submittals]
      summary: Update a submittal
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: submittalId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubmittalRequest"
      responses:
        "200":
          description: Submittal updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submittal"

  /projects/{projectId}/activity:
    get:
      operationId: listActivity
      tags: [activity]
      summary: List activity log for a project (read-only, no delete)
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activity log
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"

  /projects/{projectId}/conventions:
    get:
      operationId: getConvention
      tags: [conventions]
      summary: Get naming convention for a project
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Naming convention with fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NamingConvention"
    put:
      operationId: upsertConvention
      tags: [conventions]
      summary: Create or update naming convention for a project
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertConventionRequest"
      responses:
        "200":
          description: Convention saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NamingConvention"

  /projects/{projectId}/members:
    get:
      operationId: listMembers
      tags: [members]
      summary: List team members for a project
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectMember"
    post:
      operationId: addMember
      tags: [members]
      summary: Add a team member to a project
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberRequest"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMember"

  /projects/{projectId}/members/{memberId}:
    patch:
      operationId: updateMember
      tags: [members]
      summary: Update a team member's role
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRequest"
      responses:
        "200":
          description: Member updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMember"
    delete:
      operationId: removeMember
      tags: [members]
      summary: Remove a team member from a project
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ConfigOption:
      type: object
      properties:
        value:
          type: string
        label:
          type: string
        labelEs:
          type: string
        meta:
          type: object
          additionalProperties:
            type: string
      required:
        - value
        - label
        - labelEs

    AppConfig:
      type: object
      additionalProperties:
        type: array
        items:
          $ref: "#/components/schemas/ConfigOption"

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ValidationErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
              expected:
                type: array
                items:
                  type: string
              received:
                type: string
            required:
              - field
              - message
      required:
        - error
        - details

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        fullName:
          type: string
        companyName:
          type: string
      required:
        - email
        - password
        - fullName
        - companyName

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        fullName:
          type: string
        companyName:
          type: string
        companyId:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - fullName
        - companyName
        - companyId
        - createdAt

    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        code:
          type: string
        status:
          type: string
        createdById:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        memberCount:
          type: integer
        fileCount:
          type: integer
      required:
        - id
        - name
        - code
        - status
        - createdById
        - createdAt
        - updatedAt

    CreateProjectRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        code:
          type: string
      required:
        - name
        - code

    ProjectFile:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        fileName:
          type: string
        fileSize:
          type: integer
        fileType:
          type: string
        version:
          type: integer
        status:
          type: string
        uploadedById:
          type: integer
        uploadedByName:
          type: string
        uploadedByCompany:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - fileName
        - fileSize
        - fileType
        - version
        - status
        - uploadedById
        - uploadedByName
        - createdAt
        - updatedAt

    UploadFileRequest:
      type: object
      properties:
        fileName:
          type: string
        fileSize:
          type: integer
        fileType:
          type: string
      required:
        - fileName
        - fileSize
        - fileType

    UpdateFileRequest:
      type: object
      properties:
        fileName:
          type: string
        status:
          type: string

    Rfi:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        number:
          type: string
        subject:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
        assignedToId:
          type: integer
        assignedToName:
          type: string
        createdById:
          type: integer
        createdByName:
          type: string
        dueDate:
          type: string
          format: date-time
        respondedAt:
          type: string
          format: date-time
        response:
          type: string
        sendStatus:
          type: string
        sentAt:
          type: string
          format: date-time
        sentById:
          type: integer
        sendMethod:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - number
        - subject
        - status
        - priority
        - createdById
        - createdByName
        - createdAt
        - updatedAt

    CreateRfiRequest:
      type: object
      properties:
        subject:
          type: string
        description:
          type: string
        priority:
          type: string
        assignedToId:
          type: integer
        dueDate:
          type: string
          format: date-time
      required:
        - subject
        - priority

    UpdateRfiRequest:
      type: object
      properties:
        subject:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
        assignedToId:
          type: integer
        response:
          type: string
        dueDate:
          type: string
          format: date-time

    Submittal:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        number:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
        specSection:
          type: string
        submittalType:
          type: string
        submittedById:
          type: integer
        submittedByName:
          type: string
        assignedToId:
          type: integer
        assignedToName:
          type: string
        dueDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - number
        - title
        - status
        - submittedById
        - submittedByName
        - createdAt
        - updatedAt

    CreateSubmittalRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        specSection:
          type: string
        submittalType:
          type: string
        assignedToId:
          type: integer
        dueDate:
          type: string
          format: date-time
      required:
        - title
        - submittalType

    UpdateSubmittalRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
        specSection:
          type: string
        assignedToId:
          type: integer
        dueDate:
          type: string
          format: date-time

    ActivityEntry:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        userId:
          type: integer
        userFullName:
          type: string
        userCompanyName:
          type: string
        actionType:
          type: string
        entityType:
          type: string
        entityId:
          type: integer
        fileNameBefore:
          type: string
        fileNameAfter:
          type: string
        details:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - userId
        - userFullName
        - userCompanyName
        - actionType
        - entityType
        - createdAt

    NamingConvention:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        separator:
          type: string
        isActive:
          type: boolean
        fields:
          type: array
          items:
            $ref: "#/components/schemas/NamingField"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - separator
        - isActive
        - fields
        - createdAt
        - updatedAt

    NamingField:
      type: object
      properties:
        id:
          type: integer
        label:
          type: string
        fieldOrder:
          type: integer
        allowedValues:
          type: array
          items:
            type: string
      required:
        - id
        - label
        - fieldOrder
        - allowedValues

    UpsertConventionRequest:
      type: object
      properties:
        separator:
          type: string
        isActive:
          type: boolean
        fields:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              fieldOrder:
                type: integer
              allowedValues:
                type: array
                items:
                  type: string
            required:
              - label
              - fieldOrder
              - allowedValues
      required:
        - separator
        - isActive

    ProjectMember:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        userId:
          type: integer
        userFullName:
          type: string
        userEmail:
          type: string
        userCompanyName:
          type: string
        role:
          type: string
        joinedAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - userId
        - userFullName
        - userEmail
        - role
        - joinedAt

    AddMemberRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          type: string
      required:
        - email
        - role

    UpdateMemberRequest:
      type: object
      properties:
        role:
          type: string
      required:
        - role
